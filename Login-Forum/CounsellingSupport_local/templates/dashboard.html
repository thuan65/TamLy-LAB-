<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: sans-serif; margin: 20px; background: #f8f9fa; }
h2 { margin-bottom: 20px; }
.section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; background: #fff; }
.section h3 { margin-top: 0; }
.button-list button { margin: 5px; padding: 8px 12px; cursor: pointer; }
.button-list { display: flex; flex-wrap: wrap; }
#notifications { color: red; margin-bottom: 10px; }
</style>
</head>
<body>
<h2>👋 Chào {{ username }}!</h2>
<div id="notifications"></div>

{% if role == "student" %}
<!-- Forum -->
<div class="section" id="forum-section">
  <h3>📚 Forum</h3>
  <button class="btn btn-success" onclick="window.location='/forum'">Vào Forum</button>
</div>

<!-- Chat với chuyên gia -->
<div class="section" id="expert-chat-section">
  <h3>💬 Chat với chuyên gia</h3>
  <div class="button-list" id="expert-list"></div>
</div>

{% else %}
<!-- Expert view -->
<!-- Forum -->
<div class="section" id="forum-section">
  <h3>📚 Forum</h3>
  <button class="btn btn-success" onclick="window.location='/forum'">Vào Forum</button>
</div>

<!-- Chat với học sinh -->
<div class="section" id="student-chat-section">
  <h3>💬 Chat với học sinh</h3>
  <div class="button-list" id="student-list"></div>
</div>
{% endif %}

<script>
const role = "{{ role }}";
const userId = "{{ user_id }}";

// Load danh sách chuyên gia cho student
async function loadExperts() {
  if(role !== "student") return;
  try {
    const res = await fetch("/expert/api/get_all_experts");
    const data = await res.json();
    const div = document.getElementById("expert-list");
    div.innerHTML = "";
    data.experts.forEach(e => {
      const btn = document.createElement("button");
      btn.textContent = e.username;
      btn.classList.add("btn","btn-primary","btn-sm");
      btn.onclick = () => window.location = `/expert/${e.id}`;
      div.appendChild(btn);
    });
  } catch(err){ console.error(err); }
}

// Load danh sách học sinh đã chat cho expert
async function loadStudents() {
  if(role !== "expert") return;
  try {
    const res = await fetch(`/expert/api/get_chats_for_expert/${userId}`);
    const data = await res.json();
    const div = document.getElementById("student-list");
    div.innerHTML = "";
    if(data.students.length === 0) div.textContent = "Chưa có học sinh nào chat.";
    data.students.forEach(sid => {
      const btn = document.createElement("button");
      btn.textContent = "Học sinh " + sid;
      btn.classList.add("btn","btn-primary","btn-sm");
      btn.onclick = () => window.location = `/expert/${sid}`;
      div.appendChild(btn);
    });
  } catch(err){ console.error(err); }
}

// Thông báo tin nhắn mới
async function checkUnread() {
  try {
    const res = await fetch(`/expert/api/get_unread/${role}/${userId}`);
    const data = await res.json();
    const notif = document.getElementById("notifications");
    notif.textContent = data.unread>0 ? `Bạn có ${data.unread} tin nhắn mới!` : "";
  } catch(err){ console.error(err); }
}

window.onload = () => {
  loadExperts();
  loadStudents();
  checkUnread();
  setInterval(checkUnread, 5000);
  setInterval(loadExperts, 5000);
  setInterval(loadStudents, 5000);
}
</script>
</body>
</html>
